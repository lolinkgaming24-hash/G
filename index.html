<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJK Stickman Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="p1-hud" class="hud">
        <div class="bar"><div id="p1-hp" class="hp-f"></div></div>
        <div class="bar-cd"><div id="p1-cd" class="cd-f"></div></div>
    </div>
    <div id="p2-hud" class="hud">
        <div class="bar"><div id="p2-hp" class="hp-f"></div></div>
        <div class="bar-cd"><div id="p2-cd" class="cd-f"></div></div>
    </div>

    <div id="m-start" class="overlay active-menu">
        <h1 class="title">JJK STICKMAN</h1>
        <button class="menu-btn" onpointerdown="startSelectedMode('1P')">1P vs CPU</button>
        <button class="menu-btn" onpointerdown="startSelectedMode('2P')">2P VERSUS</button>
    </div>

    <div id="m-char" class="overlay">
        <h2 id="selection-title" class="title" style="font-size: 1.5rem;">SELECT CHARACTER</h2>
        <div class="grid" id="char-grid"></div>
    </div>

    <div id="win-screen" class="overlay">
        <h1 id="win-text" class="title">PLAYER 1 WINS</h1>
        <button class="menu-btn" onpointerdown="handleRestart()">REMATCH</button>
    </div>

    <div id="m-pause" class="overlay">
        <h1 class="title">PAUSED</h1>
        <button class="menu-btn" onpointerdown="handlePauseToggle()">RESUME</button>
        <button class="menu-btn" onpointerdown="handleRestart()">EXIT</button>
    </div>

    <div id="controls" class="ctrl-container">
        <div id="p1-pad" class="pad">
            <button class="ctrl-btn btn-u" data-p="1" data-v="u">JUMP</button>
            <button class="ctrl-btn btn-l" data-p="1" data-v="l">←</button>
            <button class="ctrl-btn btn-r" data-p="1" data-v="r">→</button>
            <button class="ctrl-btn btn-a" data-p="1" data-v="a">ATK</button>
            <button class="ctrl-btn btn-s" data-p="1" data-v="s">SPC</button>
        </div>
        <div id="p2-pad" class="pad">
            <button class="ctrl-btn btn-u" data-p="2" data-v="u">JUMP</button>
            <button class="ctrl-btn btn-l" data-p="2" data-v="l">←</button>
            <button class="ctrl-btn btn-r" data-p="2" data-v="r">→</button>
            <button class="ctrl-btn btn-a" data-p="2" data-v="a">ATK</button>
            <button class="ctrl-btn btn-s" data-p="2" data-v="s">SPC</button>
        </div>
    </div>

    <button id="pause-btn" onpointerdown="handlePauseToggle()">II</button>
    
    <script src="script.js"></script>
</body>
</html>
